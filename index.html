<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIGA-ME STORE</title>

<style>
body {
  margin: 0;
  background: url("fundo.png") no-repeat center center fixed;
  background-size: cover;
  color: white;
  font-family: Arial;
}

header {
  text-align: center;
  padding: 20px;
}

header img {
  width: 150px;
}

/* BARRA DE PESQUISA */
.pesquisa {
  width: calc(100% - 40px);
  margin: 20px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  outline: none;
}

.main {
  display: flex;
  flex-wrap: wrap;
}

.container {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.produto {
  background: rgba(0,0,0,0.7);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.produto img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: #00c853;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #00a844;
}

.remover {
  background: red;
  margin-left: 10px;
}

.carrinho {
  flex: 1;
  min-width: 250px;
  background: rgba(0,0,0,0.85);
  padding: 15px;
}

.finalizar {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  background: #00c853;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.finalizar:hover {
  background: #00a844;
  transform: scale(1.03);
}

.sugestoes {
  margin-top: 20px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
}

.sugestoes input,
.sugestoes select,
.sugestoes textarea {
  width: 100%;
  box-sizing: border-box;
  margin: 6px 0;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

.sugestoes textarea {
  height: 80px;
  resize: none;
}

.sugestoes button {
  width: 100%;
}
</style>
</head>

<body>

<header>
  <img src="Logo.png">
  <h1>SIGA-ME STORE</h1>
</header>

<!-- BARRA DE PESQUISA -->
<input
type="text"
id="pesquisa"
class="pesquisa"
placeholder="Pesquisar produtos..."
onkeyup="filtrarProdutos()">

<div class="main">

  <!-- SEM PRODUTOS -->
  <div class="container">

  </div>

  <div class="carrinho">
    <h3>Carrinho</h3>
    <div id="lista">Vazio</div>
    <p id="total">Total: R$ 0.00</p>

    <button class="finalizar" onclick="enviar()">Finalizar compra</button>

    <div class="sugestoes">
      <h3>Sugira um produto</h3>

      <input type="text" id="nomeCliente" placeholder="Seu nome (opcional)">

      <select id="tipoProduto">
        <option value="" disabled selected>Tipo de produto</option>
        <option value="Livro">Livro</option>
        <option value="Curso">Curso</option>
        <option value="Pdf">Pdf</option>
        <option value="Outro">Outro</option>
      </select>

      <textarea id="sugestaoInput" placeholder="Ex: Bíblia de estudo, livro..."></textarea>

      <button onclick="enviarSugestao()">Quero que vocês vendam isso</button>
    </div>
  </div>

</div>

<script>
let carrinho = [];

function add(nome, preco){
  carrinho.push({nome, preco});
  atualizar();
}

function atualizar(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;

  carrinho.forEach((item,i)=>{
    lista.innerHTML += `
      <p>${item.nome} - R$ ${item.preco.toFixed(2)}
      <button class='remover' onclick='remover(${i})'>X</button></p>`;
    total += item.preco;
  });

  if(carrinho.length === 0){
    lista.innerHTML = "Vazio";
  }

  document.getElementById("total").innerHTML =
    "Total: R$ " + total.toFixed(2);
}

function remover(i){
  carrinho.splice(i,1);
  atualizar();
}

function enviar(){
  let msg = "Pedido:%0A";
  let total = 0;

  carrinho.forEach(p=>{
    msg += p.nome + " - R$ " + p.preco.toFixed(2) + "%0A";
    total += p.preco;
  });

  msg += "%0ATotal: R$ " + total.toFixed(2);

  window.open(
    "https://wa.me/5574999019805?text=" + msg,
    "_blank"
  );
}

function enviarSugestao(){
  let nome = document.getElementById("nomeCliente").value || "Anônimo";
  let tipo = document.getElementById("tipoProduto").value;
  let sugestao = document.getElementById("sugestaoInput").value;

  if(sugestao.trim() === "" || tipo === ""){
    alert("Preencha o tipo e a sugestão!");
    return;
  }

  let msg = "💡 Sugestão de Produto:%0A";
  msg += "👤 Nome: " + nome + "%0A";
  msg += "📦 Tipo: " + tipo + "%0A";
  msg += "📝 Sugestão: " + sugestao;

  window.open(
    "https://wa.me/5574999019805?text=" + msg,
    "_blank"
  );
}

/* PESQUISA */
function filtrarProdutos() {
  let filtro = document.getElementById("pesquisa").value.toLowerCase();
  let produtos = document.querySelectorAll(".produto");

  produtos.forEach(produto => {
    let nome = produto.querySelector("h2").textContent.toLowerCase();

    if (nome.includes(filtro)) {
      produto.style.display = "";
    } else {
      produto.style.display = "none";
    }
  });
}
</script>

</body>
</html>
