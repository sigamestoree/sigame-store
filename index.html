<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Siga-me Store</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial;
}

header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid #333;
}

header img {
  width: 150px;
}

h1 {
  text-align: center;
}

/* CONTAINER PRINCIPAL */
.main {
  display: flex;
  flex-wrap: wrap;
}

/* PRODUTOS */
.container {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.produto {
  background: #111;
  border: 1px solid #333;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
}

button {
  background: #00aaff;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

/* CARRINHO (AGORA LATERAL FIXO SEM TAPAR) */
.carrinho {
  flex: 1;
  min-width: 250px;
  max-width: 300px;
  background: #111;
  border-left: 1px solid #333;
  padding: 15px;
}

.finalizar {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>SIGA-ME STORE</h1>
</header>

<div class="main">

  <!-- PRODUTOS -->
  <div class="container">

    <div class="produto">
      <h2>Camiseta Street</h2>
      <p>R$ 59,90</p>
      <button onclick="add('Camiseta Street', 59.9)">Adicionar</button>
    </div>

    <div class="produto">
      <h2>Boné Urbano</h2>
      <p>R$ 39,90</p>
      <button onclick="add('Boné Urbano', 39.9)">Adicionar</button>
    </div>

    <div class="produto">
      <h2>Moletom Premium</h2>
      <p>R$ 99,90</p>
      <button onclick="add('Moletom Premium', 99.9)">Adicionar</button>
    </div>

  </div>

  <!-- CARRINHO -->
  <div class="carrinho">
    <h3>Carrinho</h3>
    <div id="lista"></div>
    <p id="total">Total: R$ 0</p>

    <button class="finalizar" onclick="enviar()">Finalizar compra</button>
  </div>

</div>

<script>
let carrinho = [];

function add(nome, preco) {
  carrinho.push({nome, preco});
  atualizar();
}

function atualizar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  let total = 0;

  carrinho.forEach(item => {
    lista.innerHTML += `<p>${item.nome} - R$ ${item.preco.toFixed(2)}</p>`;
    total += item.preco;
  });

  document.getElementById("total").innerHTML = 
    "Total: R$ " + total.toFixed(2);
}

function enviar() {
  if (carrinho.length === 0) {
    alert("Seu carrinho está vazio!");
    return;
  }

  let msg = "🛍️ Pedido - Siga-me Store:%0A";
  let total = 0;

  carrinho.forEach(item => {
    msg += item.nome + " - R$ " + item.preco.toFixed(2) + "%0A";
    total += item.preco;
  });

  msg += "%0ATotal: R$ " + total.toFixed(2);

  window.open("https://wa.me/5574999019805?text=" + msg);
}
</script>

</body>
</html>
